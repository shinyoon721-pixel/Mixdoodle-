<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixMediaDoodle | Video Editor</title>
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00f2ff; --dark: #1a1a1a; }
        body { font-family: 'Courier New', monospace; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .editor-box { border: 4px solid var(--neon-pink); padding: 30px; border-radius: 15px; box-shadow: 0 0 20px var(--neon-pink); max-width: 600px; background: #000; }
        h1 { text-transform: uppercase; letter-spacing: 5px; color: var(--neon-blue); }
        #video-container { position: relative; margin: 20px 0; background: #222; min-height: 200px; border-radius: 10px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        video { width: 100%; display: block; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 10px 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--neon-blue); color: black; }
        input[type="file"] { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>MixMediaDoodle</h1>

    <div class="editor-box">
        <input type="file" id="uploader" accept="video/*">
        
        <div id="video-container">
            <video id="player" controls></video>
            <canvas id="doodleCanvas"></canvas>
        </div>

        <div class="controls">
            <button onclick="applyDoodles()">✨ Add Random Doodles</button>
            <button onclick="clearCanvas()">❌ Clear</button>
        </div>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #888;">Supports videos 10s to 3m.</p>
    </div>

    <script>
        const video = document.getElementById('player');
        const canvas = document.getElementById('doodleCanvas');
        const ctx = canvas.getContext('2d');
        const uploader = document.getElementById('uploader');

        // Load Video
        uploader.onchange = (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            video.src = url;
            
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                // Check duration constraint
                if (video.duration < 10 || video.duration > 180) {
                    alert("Please select a video between 10 seconds and 3 minutes.");
                    video.src = "";
                }
            };
        };

        // Create the "Mix Media" Doodle Effect
        function applyDoodles() {
            if (!video.src) return;
            
            // Generate 15 random doodles
            for (let i = 0; i < 15; i++) {
                ctx.strokeStyle = Math.random() > 0.5 ? '#ff00ff' : '#00f2ff';
                ctx.lineWidth = Math.random() * 5 + 2;
                ctx.beginPath();
                
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                
                // Draw a "scribble"
                ctx.moveTo(x, y);
                ctx.bezierCurveTo(x+50, y-50, x-50, y+50, x+20, y+20);
                ctx.stroke();

                // Add a "hand-drawn" star
                if (i % 3 === 0) {
                    ctx.fillStyle = "yellow";
                    ctx.fillText("★", x, y);
                }
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
